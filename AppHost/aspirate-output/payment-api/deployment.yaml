---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-api
  labels:
    app: payment-api
spec:
  minReadySeconds: 60
  replicas: 1
  selector:
    matchLabels:
      app: payment-api
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: payment-api
    spec:
      containers:
      - name: payment-api
        image: ghcr.io/dddsample/payment-api:latest
        imagePullPolicy: IfNotPresent
        ports:
        - name: http
          containerPort: 8080
        - name: https
          containerPort: 8443
        - name: rest
          containerPort: 9092
        - name: grpc
          containerPort: 9093
        envFrom:
        - configMapRef:
            name: payment-api-env
      terminationGracePeriodSeconds: 180