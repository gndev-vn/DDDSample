syntax = "proto3";
import "Catalog/Models/categoryDto.proto";
import "Catalog/Models/productDto.proto";

message GetCategoryRequest {
  string id = 1;
}

message GetCategoryResponse {
  CategoryDto Category = 1;
}

message GetCategoriesRequest {
  int32 page = 1;
  int32 pageSize = 2;
  string searchName = 3;
  string searchSlug = 4;
}

message GetCategoriesResponse {
  repeated CategoryDto Categories = 1;
}

message CreateCategoryRequest {
  string name = 1;
  string description = 2;
  string slug = 3;
  bool isActive = 4;
  repeated ProductDto products = 5;
}

message CreateCategoryResponse {
  string id = 1;
}

message UpdateCategoryRequest {
  string id = 1;
  string name = 2;
  string description = 3;
  string slug = 4;
  bool isActive = 5;
  repeated ProductDto variants = 6;
}

message UpdateCategoryResponse {
  string id = 1;
}

message DeleteCategoryRequest {
  string id = 1;
}

message DeleteCategoryResponse {
  bool success = 1;
}

service CategorySvc {
  rpc GetById(GetCategoryRequest) returns (GetCategoryResponse);
  rpc GetCategories(GetCategoriesRequest) returns (GetCategoriesResponse);
  rpc Create(CreateCategoryRequest) returns (CreateCategoryResponse);
  rpc Update(UpdateCategoryRequest) returns (UpdateCategoryResponse);
  rpc Delete(DeleteCategoryRequest) returns (DeleteCategoryResponse);
}