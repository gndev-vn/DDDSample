syntax = "proto3";
import "Common/decimal.proto";
import "Catalog/Models/productDto.proto";
import "Catalog/Models/productVariantDto.proto";

message GetProductRequest {
  string id = 1;
}

message GetProductResponse {
  ProductDto product = 1;
}

message GetProductsRequest {
  int32 page = 1;
  int32 pageSize = 2;
  string searchName = 3;
  string searchSlug = 4;
}

message GetProductsResponse {
  repeated ProductDto products = 1;
}

message GetProductsByIdsRequest {
}

message GetProductsByIdsResponse {
  repeated ProductDto products = 1;
}

message ProductCreateRequest {
  string name = 1;
  string description = 2;
  string slug = 3;
  bool isActive = 4;
  string currency = 5;
  GrpcShared.Types.Decimal basePrice = 6;
  repeated ProductVariantDto variants = 7;
}

message ProductCreateResponse {
  string id = 1;
}

message ProductUpdateRequest {
  string id = 1;
  string name = 2;
  string description = 3;
  string slug = 4;
  bool isActive = 5;
  string currency = 6;
  GrpcShared.Types.Decimal basePrice = 7;
  repeated ProductVariantDto variants = 8;
}

message ProductUpdateResponse {
  string id = 1;
}

message ProductDeleteRequest {
  string id = 1;
}

message ProductDeleteResponse {
  bool success = 1;
}

service ProductSvc {
  rpc GetById(GetProductRequest) returns (GetProductResponse);
  rpc GetProducts(GetProductsRequest) returns (GetProductsResponse);
  rpc GetProductsByIds(GetProductsByIdsRequest) returns (GetProductsByIdsResponse);
  rpc Create(ProductCreateRequest) returns (ProductCreateResponse);
  rpc Update(ProductUpdateRequest) returns (ProductUpdateResponse);
  rpc Delete(ProductDeleteRequest) returns (ProductDeleteResponse);
}