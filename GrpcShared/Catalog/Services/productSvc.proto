syntax = "proto3";
import "Common/moneyDto.proto";
import "Catalog/Models/productDto.proto";
import "Catalog/Models/productVariantDto.proto";

message GetProductRequest {
  string id = 1;
}

message GetProductResponse {
  ProductDto product = 1;
}

message GetProductsRequest {
  int32 page = 1;
  int32 pageSize = 2;
  string searchName = 3;
  string searchSlug = 4;
}

message GetProductsResponse {
  repeated ProductDto products = 1;
}

message GetProductsByIdsRequest {
}

message GetProductsByIdsResponse {
  repeated ProductDto products = 1;
}

message CreateProductRequest {
  string name = 1;
  string description = 2;
  string slug = 3;
  bool isActive = 4;
  MoneyDto basePrice = 5;
  repeated ProductVariantDto variants = 6;
}

message CreateProductResponse {
  string id = 1;
}

message UpdateProductRequest {
  string id = 1;
  string name = 2;
  string description = 3;
  string slug = 4;
  bool isActive = 5;
  MoneyDto basePrice = 6;
  repeated ProductVariantDto variants = 7;
}

message UpdateProductResponse {
  string id = 1;
}

message DeleteProductRequest {
  string id = 1;
}

message DeleteProductResponse {
  bool success = 1;
}

service ProductSvc {
  rpc GetById(GetProductRequest) returns (GetProductResponse);
  rpc GetProducts(GetProductsRequest) returns (GetProductsResponse);
  rpc GetProductsByIds(GetProductsByIdsRequest) returns (GetProductsByIdsResponse);
  rpc Create(CreateProductRequest) returns (CreateProductResponse);
  rpc Update(UpdateProductRequest) returns (UpdateProductResponse);
  rpc Delete(DeleteProductRequest) returns (DeleteProductResponse);
}